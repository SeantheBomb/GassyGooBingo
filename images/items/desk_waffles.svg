<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Desk surface -->
  <rect x="4" y="88" width="120" height="14" rx="4" fill="#8B6914" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="4" y="98" width="120" height="24" rx="3" fill="#6a5010" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Waffle iron (open, on desk) -->
  <rect x="10" y="62" width="50" height="28" rx="5" fill="#555" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="14" y="66" width="42" height="20" rx="3" fill="#333"/>
  <!-- Waffle grid pattern on hot plate -->
  <line x1="22" y1="66" x2="22" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="30" y1="66" x2="30" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="38" y1="66" x2="38" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="46" y1="66" x2="46" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="14" y1="72" x2="56" y2="72" stroke="#555" stroke-width="1.5"/>
  <line x1="14" y1="78" x2="56" y2="78" stroke="#555" stroke-width="1.5"/>
  <!-- Waffle on the desk (cooked, off to side) -->
  <rect x="64" y="60" width="56" height="28" rx="6" fill="#f4a460" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Waffle grid -->
  <line x1="76" y1="60" x2="76" y2="88" stroke="#c8781a" stroke-width="2"/>
  <line x1="88" y1="60" x2="88" y2="88" stroke="#c8781a" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="88" stroke="#c8781a" stroke-width="2"/>
  <line x1="64" y1="70" x2="120" y2="70" stroke="#c8781a" stroke-width="2"/>
  <line x1="64" y1="79" x2="120" y2="79" stroke="#c8781a" stroke-width="2"/>
  <!-- Syrup drizzle on waffle -->
  <path d="M68 62 Q78 58 88 64 Q98 70 108 62" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Steam from waffle -->
  <path d="M76 52 Q74 44 78 38" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M90 50 Q88 40 92 34" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M104 52 Q102 42 106 36" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Iron handle -->
  <rect x="4" y="68" width="14" height="8" rx="3" fill="#333" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Power cord -->
  <path d="M60 80 Q58 90 44 90" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Power indicator light (green = on) -->
  <circle cx="18" cy="64" r="4" fill="#27ae60" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- "AT DESK" label -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B6914" font-weight="bold">DESK WAFFLES</text>
</svg>
