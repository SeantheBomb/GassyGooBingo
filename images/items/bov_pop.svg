<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Popsicle stick -->
  <rect x="59" y="72" width="10" height="44" rx="4" fill="#d4a06a" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Popsicle body (dark brown - bovril flavour) -->
  <rect x="36" y="18" width="56" height="60" rx="10" fill="#4a2200" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Bovril label on popsicle -->
  <rect x="36" y="34" width="56" height="22" fill="#c0392b"/>
  <text x="64" y="49" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#fff" letter-spacing="1">BOVRIL</text>
  <!-- Ice/frozen texture on top -->
  <rect x="36" y="18" width="56" height="18" rx="10" fill="#3a1800" opacity="0.6"/>
  <!-- Shine -->
  <rect x="42" y="22" width="8" height="40" rx="4" fill="#fff" opacity="0.1"/>
  <!-- Steam/cold effect -->
  <path d="M36 18 Q30 10 32 4" fill="none" stroke="#cce" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M92 18 Q98 10 96 4" fill="none" stroke="#cce" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Label -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B4513">BOV POP</text>
</svg>
