<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 100% Lindt dark chocolate bar wrapper -->
  <rect x="14" y="18" width="100" height="78" rx="6" fill="#1a0800" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Gold/cream wrapper accent -->
  <rect x="14" y="18" width="100" height="22" rx="6" fill="#c8a030"/>
  <rect x="14" y="32" width="100" height="8" fill="#c8a030"/>
  <!-- LINDT shield logo -->
  <path d="M64 22 Q70 20 74 24 Q74 32 64 36 Q54 32 54 24 Q58 20 64 22 Z" fill="#fff" stroke="#c8a030" stroke-width="1"/>
  <text x="64" y="31" text-anchor="middle" font-family="serif" font-size="7" fill="#c8a030" font-weight="bold">LINDT</text>
  <!-- 100% label -->
  <text x="64" y="56" text-anchor="middle" font-family="serif" font-size="26" font-weight="900" fill="#c8a030">100%</text>
  <!-- DARK / NOIR / DUNKLE text -->
  <text x="64" y="68" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c8a030" letter-spacing="3">DARK</text>
  <!-- Excellence bar markings -->
  <rect x="20" y="74" width="18" height="16" rx="2" fill="#2c1008" stroke="#3a1810" stroke-width="1"/>
  <rect x="42" y="74" width="18" height="16" rx="2" fill="#2c1008" stroke="#3a1810" stroke-width="1"/>
  <rect x="64" y="74" width="18" height="16" rx="2" fill="#2c1008" stroke="#3a1810" stroke-width="1"/>
  <rect x="86" y="74" width="18" height="16" rx="2" fill="#2c1008" stroke="#3a1810" stroke-width="1"/>
  <!-- Timer showing under 5 minutes challenge -->
  <text x="64" y="106" text-anchor="middle" font-family="monospace" font-size="9" fill="#c0392b" font-weight="bold">FINISH IN &lt; 5 MIN</text>
  <!-- Sweat drops (chocolate confidence) -->
  <path d="M18 50 Q16 56 18 60 Q22 62 22 58 Q22 54 18 50 Z" fill="#3498db" opacity="0.7"/>
  <path d="M108 48 Q106 54 108 58 Q112 60 112 56 Q112 52 108 48 Z" fill="#3498db" opacity="0.7"/>
</svg>
