  <!-- Mashed potato texture (slightly uneven surface) -->
  <ellipse cx="64" cy="62" rx="46" ry="46" fill="#f0d060"/>
  <!-- Face! -->
  <!-- Eyes -->
  <circle cx="46" cy="50" r="9" fill="#2a2a2a"/>
  <circle cx="82" cy="50" r="9" fill="#2a2a2a"/>
  <!-- Eye shine -->
  <circle cx="48.5" cy="47.5" r="3" fill="#fff"/>
  <circle cx="84.5" cy="47.5" r="3" fill="#fff"/>
  <!-- Big happy smile (the whole gimmick) -->
  <path d="M32 74 Q64 104 96 74" fill="none" stroke="#2a2a2a" stroke-width="7" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="34" cy="72" r="8" fill="#e88040" opacity="0.5"/>
