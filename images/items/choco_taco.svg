<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Waffle cone shell (taco shape) -->
  <path d="M14 40 Q64 110 114 40 Z" fill="#c8a030" stroke="#2a2a2a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Waffle grid pattern on shell -->
  <path d="M30 40 Q54 80 64 90" fill="none" stroke="#a07818" stroke-width="1.5" opacity="0.6"/>
  <path d="M46 40 Q64 72 74 82" fill="none" stroke="#a07818" stroke-width="1.5" opacity="0.6"/>
  <path d="M62 40 Q72 60 80 72" fill="none" stroke="#a07818" stroke-width="1.5" opacity="0.6"/>
  <path d="M78 40 Q84 52 88 62" fill="none" stroke="#a07818" stroke-width="1.5" opacity="0.6"/>
  <!-- Ice cream filling -->
  <path d="M18 40 Q64 46 110 40 Q108 55 64 58 Q20 55 18 40 Z" fill="#f5e6c8"/>
  <!-- Chocolate coating on top -->
  <path d="M18 40 Q64 34 110 40 Q108 30 64 28 Q20 30 18 40 Z" fill="#4a2200" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Chocolate drizzle -->
  <path d="M30 40 Q40 35 50 40 Q60 45 70 38 Q80 32 90 38" fill="none" stroke="#6b3310" stroke-width="3" stroke-linecap="round"/>
  <!-- Nuts/sprinkles on chocolate -->
  <circle cx="38" cy="34" r="3" fill="#c8a030"/>
  <circle cx="55" cy="31" r="3" fill="#c8a030"/>
  <circle cx="73" cy="32" r="3" fill="#c8a030"/>
  <circle cx="90" cy="35" r="3" fill="#c8a030"/>
  <circle cx="65" cy="29" r="2.5" fill="#e8b840"/>
</svg>
