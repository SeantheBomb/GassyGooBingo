<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Does It Do? - the As Seen on TV show -->
  <!-- TV screen -->
  <rect x="8" y="12" width="112" height="82" rx="8" fill="#1a1a2e" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="14" y="18" width="100" height="70" rx="4" fill="#0a0a18"/>
  <!-- Show logo on TV -->
  <!-- "DOES IT DO?" text style -->
  <rect x="20" y="24" width="88" height="28" rx="4" fill="#e74c3c"/>
  <text x="64" y="36" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#fff">DOES</text>
  <text x="64" y="48" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#fff">IT DO?</text>
  <!-- As Seen on TV badge -->
  <ellipse cx="96" cy="60" rx="16" ry="12" fill="#f1c40f"/>
  <text x="96" y="56" text-anchor="middle" font-family="monospace" font-size="5" fill="#2c3e50" font-weight="bold">AS SEEN</text>
  <text x="96" y="63" text-anchor="middle" font-family="monospace" font-size="5" fill="#2c3e50" font-weight="bold">ON TV</text>
  <!-- Product being tested (star-shaped object) -->
  <polygon points="40,72 44,60 48,72 60,72 50,80 54,92 44,84 34,92 38,80 28,72" fill="#e67e22" stroke="#2a2a2a" stroke-width="1.5" transform="scale(0.7) translate(20, 10)"/>
  <!-- DO / DON'T icons -->
  <circle cx="32" cy="76" r="10" fill="#27ae60"/>
  <text x="32" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff">✓</text>
  <!-- TV stand -->
  <rect x="50" y="94" width="28" height="8" rx="3" fill="#555" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="36" y="100" width="56" height="6" rx="3" fill="#444" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Geoff and Gavin icons (hosts) -->
  <circle cx="62" cy="76" r="8" fill="#e74c3c" opacity="0.8"/>
  <text x="62" y="80" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">G</text>
  <circle cx="78" cy="76" r="8" fill="#27ae60" opacity="0.8"/>
  <text x="78" y="80" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">G</text>
  <!-- Label -->
  <text x="64" y="116" text-anchor="middle" font-family="monospace" font-size="7" fill="#7f8c8d">Gavin &amp; Geoff test products</text>
</svg>
