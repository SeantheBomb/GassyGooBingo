<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Closet door frame -->
  <rect x="8" y="10" width="112" height="110" rx="4" fill="#8B6914" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Door panels -->
  <rect x="14" y="16" width="46" height="98" rx="3" fill="#a07828" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="66" y="16" width="46" height="98" rx="3" fill="#a07828" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Door panel insets -->
  <rect x="18" y="20" width="38" height="40" rx="2" fill="#906818" stroke="#6a4a10" stroke-width="1"/>
  <rect x="18" y="66" width="38" height="44" rx="2" fill="#906818" stroke="#6a4a10" stroke-width="1"/>
  <rect x="70" y="20" width="38" height="40" rx="2" fill="#906818" stroke="#6a4a10" stroke-width="1"/>
  <rect x="70" y="66" width="38" height="44" rx="2" fill="#906818" stroke="#6a4a10" stroke-width="1"/>
  <!-- Door knobs -->
  <circle cx="61" cy="64" r="5" fill="#c8a030" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="67" cy="64" r="5" fill="#c8a030" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Left door slightly ajar — revealing hot dog inside -->
  <!-- Hot dog visible through gap -->
  <rect x="58" y="30" width="4" height="70" fill="#1a1a1a"/>
  <!-- Hot dog in the closet (seen through gap) -->
  <!-- Bun -->
  <ellipse cx="37" cy="88" rx="14" ry="8" fill="#d4a06a" stroke="#8B4513" stroke-width="1.5"/>
  <!-- Sausage -->
  <ellipse cx="37" cy="87" rx="10" ry="5" fill="#c03030" stroke="#8B0000" stroke-width="1"/>
  <!-- Steam from cooking in closet -->
  <path d="M30 70 Q28 62 32 56" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M37 68 Q35 60 39 54" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M44 70 Q42 62 46 56" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
