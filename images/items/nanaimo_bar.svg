<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Bar (angled slice view showing 3 layers) -->
  <!-- Chocolate top layer -->
  <path d="M18 34 L110 34 L110 56 L18 56 Z" fill="#2c1008" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Custard/butter cream middle layer -->
  <path d="M18 56 L110 56 L110 80 L18 80 Z" fill="#f5e642" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Coconut/graham cracker bottom layer -->
  <path d="M18 80 L110 80 L110 104 L18 104 Z" fill="#8B6914" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Coconut flakes in bottom layer -->
  <rect x="28" y="84" width="14" height="4" rx="2" fill="#c8a860" transform="rotate(-5 35 86)"/>
  <rect x="48" y="88" width="12" height="3" rx="1.5" fill="#c8a860" transform="rotate(8 54 89)"/>
  <rect x="66" y="84" width="14" height="4" rx="2" fill="#c8a860" transform="rotate(-3 73 86)"/>
  <rect x="84" y="88" width="10" height="3" rx="1.5" fill="#c8a860" transform="rotate(6 89 89)"/>
  <rect x="34" y="94" width="12" height="3" rx="1.5" fill="#c8a860" transform="rotate(-8 40 95)"/>
  <rect x="70" y="94" width="14" height="3" rx="2" fill="#c8a860" transform="rotate(5 77 95)"/>
  <!-- Chocolate top shine -->
  <rect x="26" y="38" width="60" height="6" rx="3" fill="#fff" opacity="0.12"/>
  <!-- Custard swirl -->
  <path d="M30 68 Q52 62 74 68 Q96 74 100 68" fill="none" stroke="#f8d800" stroke-width="2" opacity="0.7"/>
  <!-- Side angle / 3D depth -->
  <path d="M110 34 L118 42 L118 112 L110 104 Z" fill="#1a0805" stroke="#2a2a2a" stroke-width="3"/>
  <path d="M110 56 L118 64" stroke="#c8b830" stroke-width="3"/>
  <path d="M110 80 L118 88" stroke="#6a5010" stroke-width="3"/>
  <!-- NANAIMO label -->
  <text x="64" y="23" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c1008" font-weight="bold">NANAIMO BAR</text>
</svg>
