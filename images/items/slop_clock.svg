<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Outer black frame -->
  <rect x="3" y="3" width="122" height="122" rx="4" fill="#111" stroke="#000" stroke-width="2"/>

  <!-- White clock face -->
  <rect x="9" y="9" width="110" height="90" fill="#f4f4f4"/>

  <!-- "Please Slop Responsibly." — small, top of face -->
  <text x="64" y="20" text-anchor="middle"
    font-family="sans-serif" font-size="5.5" fill="#222">Please Slop Responsibly.</text>

  <!-- Hour bar markers — all 12 positions, rotated around clock centre (64, 56) -->
  <!-- Each bar: 5px wide × 10px tall, top edge at y=19 (37px above centre), centred at x=61.5 -->
  <g fill="#1a1a1a">
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(0   64 56)"/><!-- 12 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(30  64 56)"/><!--  1 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(60  64 56)"/><!--  2 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(90  64 56)"/><!--  3 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(120 64 56)"/><!--  4 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(150 64 56)"/><!--  5 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(180 64 56)"/><!--  6 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(210 64 56)"/><!--  7 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(240 64 56)"/><!--  8 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(270 64 56)"/><!--  9 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(300 64 56)"/><!-- 10 -->
    <rect x="61.5" y="19" width="5" height="10" transform="rotate(330 64 56)"/><!-- 11 -->
  </g>

  <!-- Hour hand (~10 o'clock = -60° from 12) -->
  <line x1="64" y1="56" x2="46" y2="38"
    stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock = 60° from 12) -->
  <line x1="64" y1="56" x2="79" y2="32"
    stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Red second hand (pointing toward 12, with counterweight tail) -->
  <line x1="64" y1="70" x2="64" y2="26"
    stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Centre hub -->
  <circle cx="64" cy="56" r="4" fill="#111"/>
  <circle cx="64" cy="56" r="2" fill="#c0392b"/>

  <!-- Red bottom band -->
  <rect x="9" y="99" width="110" height="21" fill="#c0392b"/>

  <!-- UniForm logo area (left of band) — two overlapping U shapes + wordmark -->
  <text x="14" y="108" font-family="sans-serif" font-size="5" font-weight="900"
    fill="#fff" letter-spacing="-1">Ub</text>
  <text x="14" y="115" font-family="sans-serif" font-size="4" fill="#fff">UniForm</text>

  <!-- Slop-O-Clock wordmark (centre of band, italic bold) -->
  <text x="64" y="114" text-anchor="middle"
    font-family="Georgia, serif" font-size="13" font-weight="bold"
    font-style="italic" fill="#fff" letter-spacing="-0.5">Slop-O-Clock</text>

  <!-- Right logo mark -->
  <text x="113" y="108" text-anchor="end" font-family="sans-serif"
    font-size="4.5" font-weight="bold" fill="#fff">FACE</text>

  <!-- ×1001 lore note — very subtle, bottom of black frame -->
  <text x="64" y="126" text-anchor="middle"
    font-family="monospace" font-size="4.5" fill="#3a3a3a">×1001</text>
</svg>
