<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Clock body -->
  <circle cx="64" cy="68" r="46" fill="#e8e0c8" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Bell feet -->
  <rect x="40" y="108" width="14" height="10" rx="3" fill="#4a90d9" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="74" y="108" width="14" height="10" rx="3" fill="#4a90d9" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Bell tops -->
  <ellipse cx="38" cy="28" rx="14" ry="10" fill="#4a90d9" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="90" cy="28" rx="14" ry="10" fill="#4a90d9" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Stem -->
  <rect x="58" y="22" width="12" height="16" fill="#4a90d9" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Clock face ring -->
  <circle cx="64" cy="68" r="40" fill="none" stroke="#4a90d9" stroke-width="4"/>
  <!-- Hour marks -->
  <rect x="62" y="30" width="4" height="8" fill="#2a2a2a" rx="1"/>
  <rect x="62" y="98" width="4" height="8" fill="#2a2a2a" rx="1"/>
  <rect x="26" y="66" width="8" height="4" fill="#2a2a2a" rx="1"/>
  <rect x="94" y="66" width="8" height="4" fill="#2a2a2a" rx="1"/>
  <!-- Hour hand (pointing ~10) -->
  <line x1="64" y1="68" x2="42" y2="50" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2) -->
  <line x1="64" y1="68" x2="84" y2="48" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="64" cy="68" r="4" fill="#c0392b"/>
  <!-- "x1001" label -->
  <text x="64" y="88" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#4a90d9">x1001</text>
</svg>
