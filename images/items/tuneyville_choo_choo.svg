<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Toy train (Tuneyville Choo Choo - plays records) -->
  <!-- Train track -->
  <rect x="4" y="100" width="120" height="6" rx="2" fill="#8B6914"/>
  <rect x="4" y="94" width="120" height="4" rx="2" fill="#6a5010"/>
  <!-- Track ties -->
  <rect x="12" y="92" width="6" height="12" fill="#5a4010"/>
  <rect x="30" y="92" width="6" height="12" fill="#5a4010"/>
  <rect x="48" y="92" width="6" height="12" fill="#5a4010"/>
  <rect x="66" y="92" width="6" height="12" fill="#5a4010"/>
  <rect x="84" y="92" width="6" height="12" fill="#5a4010"/>
  <rect x="102" y="92" width="6" height="12" fill="#5a4010"/>
  <!-- Train engine body (red, old-fashioned toy train) -->
  <rect x="14" y="56" width="60" height="36" rx="6" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Engine front (rounded) -->
  <rect x="10" y="64" width="14" height="24" rx="6" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Engine cab top -->
  <rect x="44" y="44" width="26" height="18" rx="4" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Chimney / smokestack -->
  <rect x="20" y="42" width="10" height="18" rx="3" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="25" cy="42" rx="8" ry="4" fill="#333" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Smoke -->
  <circle cx="25" cy="32" r="6" fill="#ccc" opacity="0.6"/>
  <circle cx="20" cy="24" r="5" fill="#ccc" opacity="0.5"/>
  <circle cx="30" cy="20" r="4" fill="#ccc" opacity="0.4"/>
  <!-- RECORD player on top of train (plays records!) -->
  <circle cx="32" cy="52" r="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <circle cx="32" cy="52" r="4" fill="#c0392b"/>
  <circle cx="32" cy="52" r="2" fill="#1a1a1a"/>
  <!-- Windows on cab -->
  <rect x="48" y="48" width="8" height="8" rx="2" fill="#a8d8f0"/>
  <rect x="60" y="48" width="8" height="8" rx="2" fill="#a8d8f0"/>
  <!-- Wheels -->
  <circle cx="22" cy="94" r="10" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="22" cy="94" r="5" fill="#444"/>
  <circle cx="50" cy="94" r="10" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="50" cy="94" r="5" fill="#444"/>
  <circle cx="72" cy="94" r="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="72" cy="94" r="4" fill="#444"/>
  <!-- Musical notes (it plays records) -->
  <text x="100" y="68" font-size="16" font-family="sans-serif">🎵</text>
  <text x="108" y="50" font-size="12" font-family="sans-serif">🎵</text>
  <!-- Label -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#e74c3c" font-weight="bold">TUNEYVILLE CHOO CHOO</text>
</svg>
