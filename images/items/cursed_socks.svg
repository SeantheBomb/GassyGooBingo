<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Two left socks (both pointing the same way - that's the curse) -->
  <!-- Sock 1 -->
  <path d="M18 20 L18 70 Q18 78 26 82 L52 88 Q60 90 62 84 Q64 78 56 76 L36 70 L36 20 Z" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Sock 1 heel -->
  <path d="M18 60 Q18 78 26 82 L36 70 L36 60 Z" fill="#c0392b"/>
  <!-- Sock 1 toe -->
  <ellipse cx="54" cy="83" rx="10" ry="7" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sock 1 cuff stripes -->
  <rect x="18" y="20" width="18" height="5" fill="#c0392b"/>
  <rect x="18" y="29" width="18" height="3" fill="#fff" opacity="0.4"/>
  <!-- "L" labels -->
  <text x="27" y="50" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fff">L</text>

  <!-- Sock 2 (also left, curse!) -->
  <path d="M72 20 L72 70 Q72 78 80 82 L106 88 Q114 90 116 84 Q118 78 110 76 L90 70 L90 20 Z" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <path d="M72 60 Q72 78 80 82 L90 70 L90 60 Z" fill="#c0392b"/>
  <ellipse cx="108" cy="83" rx="10" ry="7" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="72" y="20" width="18" height="5" fill="#c0392b"/>
  <rect x="72" y="29" width="18" height="3" fill="#fff" opacity="0.4"/>
  <text x="81" y="50" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fff">L</text>

  <!-- Curse symbol between them -->
  <text x="64" y="14" text-anchor="middle" font-size="16" font-family="sans-serif">💀</text>

  <!-- Label -->
  <text x="64" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c" font-weight="bold">TWO LEFT SOCKS</text>
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">cursed by Gavin</text>
</svg>
