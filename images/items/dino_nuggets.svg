<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- T-Rex body (nugget shaped / breaded) -->
  <!-- Main body -->
  <ellipse cx="62" cy="78" rx="32" ry="28" fill="#e8a840" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Head -->
  <ellipse cx="72" cy="42" rx="22" ry="18" fill="#e8a840" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Neck connection -->
  <rect x="56" y="40" width="26" height="24" fill="#e8a840"/>
  <line x1="56" y1="40" x2="56" y2="64" stroke="#2a2a2a" stroke-width="5"/>
  <line x1="82" y1="40" x2="82" y2="64" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Snout -->
  <path d="M80 36 L106 34 L104 44 L80 48 Z" fill="#e8a840" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Teeth -->
  <path d="M84 44 L90 50 L96 44" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="88" cy="36" r="5" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="89" cy="36" r="2.5" fill="#2a2a2a"/>
  <!-- Tiny useless arm -->
  <path d="M56 66 L38 72 L40 80" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Legs -->
  <path d="M46 100 L38 120 L48 120 L52 106" fill="#e8a840" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <path d="M72 104 L68 120 L78 120 L78 104" fill="#e8a840" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M90 84 Q112 82 118 72" fill="none" stroke="#e8a840" stroke-width="12" stroke-linecap="round"/>
  <path d="M90 84 Q112 82 118 72" fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Breading texture dots -->
  <circle cx="55" cy="78" r="2.5" fill="#c8861a" opacity="0.7"/>
  <circle cx="68" cy="90" r="2.5" fill="#c8861a" opacity="0.7"/>
  <circle cx="78" cy="80" r="2" fill="#c8861a" opacity="0.7"/>
</svg>
