<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Plinko board - flavour plinko (Andrew's best idea) -->
  <!-- Board background -->
  <rect x="10" y="8" width="108" height="110" rx="6" fill="#2c3e50" stroke="#2a2a2a" stroke-width="3"/>
  <!-- FLAVOUR PLINKO header -->
  <rect x="10" y="8" width="108" height="20" rx="6" fill="#e74c3c"/>
  <text x="64" y="22" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#fff">FLAVOUR PLINKO</text>
  <!-- Peg grid -->
  <g fill="#ecf0f1">
    <circle cx="32" cy="42" r="4"/>
    <circle cx="52" cy="42" r="4"/>
    <circle cx="72" cy="42" r="4"/>
    <circle cx="92" cy="42" r="4"/>
    <circle cx="112" cy="42" r="4"/>
    <circle cx="22" cy="56" r="4"/>
    <circle cx="42" cy="56" r="4"/>
    <circle cx="62" cy="56" r="4"/>
    <circle cx="82" cy="56" r="4"/>
    <circle cx="102" cy="56" r="4"/>
    <circle cx="32" cy="70" r="4"/>
    <circle cx="52" cy="70" r="4"/>
    <circle cx="72" cy="70" r="4"/>
    <circle cx="92" cy="70" r="4"/>
    <circle cx="112" cy="70" r="4"/>
    <circle cx="22" cy="84" r="4"/>
    <circle cx="42" cy="84" r="4"/>
    <circle cx="62" cy="84" r="4"/>
    <circle cx="82" cy="84" r="4"/>
    <circle cx="102" cy="84" r="4"/>
  </g>
  <!-- Falling chip/disc -->
  <circle cx="62" cy="62" r="7" fill="#f1c40f" stroke="#e74c3c" stroke-width="2"/>
  <text x="62" y="66" text-anchor="middle" font-family="monospace" font-size="6" fill="#e74c3c" font-weight="bold">F</text>
  <!-- Bottom prize slots -->
  <rect x="12" y="96" width="18" height="20" rx="2" fill="#e74c3c"/>
  <rect x="32" y="96" width="18" height="20" rx="2" fill="#3498db"/>
  <rect x="52" y="96" width="18" height="20" rx="2" fill="#27ae60"/>
  <rect x="72" y="96" width="18" height="20" rx="2" fill="#f1c40f"/>
  <rect x="92" y="96" width="18" height="20" rx="2" fill="#8e44ad"/>
  <text x="21" y="110" text-anchor="middle" font-family="monospace" font-size="5" fill="#fff">HOT</text>
  <text x="41" y="110" text-anchor="middle" font-family="monospace" font-size="5" fill="#fff">MILD</text>
  <text x="61" y="110" text-anchor="middle" font-family="monospace" font-size="4" fill="#fff">MEDIUM</text>
  <text x="81" y="110" text-anchor="middle" font-family="monospace" font-size="5" fill="#1a1a1a">TANGY</text>
  <text x="101" y="110" text-anchor="middle" font-family="monospace" font-size="4" fill="#fff">SWEET</text>
</svg>
