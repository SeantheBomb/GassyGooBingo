<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Castle wall battlements -->
  <rect x="8" y="64" width="112" height="56" fill="#8B8074" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Battlement teeth -->
  <rect x="8" y="48" width="22" height="22" rx="2" fill="#8B8074" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="42" y="48" width="22" height="22" rx="2" fill="#8B8074" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="76" y="48" width="22" height="22" rx="2" fill="#8B8074" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="110" y="48" width="18" height="22" rx="2" fill="#8B8074" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Stone texture lines -->
  <path d="M8 80 L120 80" stroke="#6a6058" stroke-width="1.5"/>
  <path d="M8 94 L120 94" stroke="#6a6058" stroke-width="1.5"/>
  <path d="M30 64 L30 120" stroke="#6a6058" stroke-width="1.5"/>
  <path d="M65 64 L65 120" stroke="#6a6058" stroke-width="1.5"/>
  <path d="M95 64 L95 120" stroke="#6a6058" stroke-width="1.5"/>
  <!-- Cannon wheels -->
  <circle cx="46" cy="88" r="16" fill="#4a3820" stroke="#2a2a2a" stroke-width="4"/>
  <circle cx="84" cy="88" r="16" fill="#4a3820" stroke="#2a2a2a" stroke-width="4"/>
  <circle cx="46" cy="88" r="6" fill="#2a2a2a"/>
  <circle cx="84" cy="88" r="6" fill="#2a2a2a"/>
  <!-- Wheel spokes -->
  <line x1="46" y1="72" x2="46" y2="104" stroke="#6a5030" stroke-width="3"/>
  <line x1="30" y1="88" x2="62" y2="88" stroke="#6a5030" stroke-width="3"/>
  <line x1="84" y1="72" x2="84" y2="104" stroke="#6a5030" stroke-width="3"/>
  <line x1="68" y1="88" x2="100" y2="88" stroke="#6a5030" stroke-width="3"/>
  <!-- Cannon barrel (pointing right out of gap) -->
  <rect x="58" y="58" width="58" height="24" rx="10" fill="#2a2a2a" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="60" y="62" width="52" height="16" rx="8" fill="#4a4a4a"/>
  <!-- Cannonball -->
  <circle cx="124" cy="40" r="10" fill="#2a2a2a" stroke="#555" stroke-width="2"/>
  <!-- Smoke puff -->
  <circle cx="112" cy="60" r="8" fill="#aaa" opacity="0.6"/>
  <circle cx="104" cy="54" r="7" fill="#ccc" opacity="0.5"/>
  <circle cx="118" cy="52" r="6" fill="#bbb" opacity="0.5"/>
</svg>
