<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Body -->
  <ellipse cx="62" cy="90" rx="32" ry="22" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Neck -->
  <rect x="55" y="58" width="18" height="36" rx="8" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Head (small compared to snout) -->
  <ellipse cx="64" cy="52" rx="14" ry="12" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="4"/>
  <!-- The legendary LONG snout -->
  <path d="M50 52 Q20 54 10 58 Q8 62 14 64 Q18 66 30 64 Q42 62 50 60 Z" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Nose tip -->
  <ellipse cx="11" cy="61" rx="5" ry="4" fill="#e8b4a0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Nostrils -->
  <ellipse cx="9" cy="61" rx="2" ry="1.5" fill="#2a2a2a"/>
  <ellipse cx="13" cy="61" rx="2" ry="1.5" fill="#2a2a2a"/>
  <!-- Eye -->
  <circle cx="62" cy="48" r="4" fill="#2a2a2a"/>
  <circle cx="63.5" cy="46.5" r="1.5" fill="#fff"/>
  <!-- Ear (long floppy) -->
  <path d="M74 44 Q84 38 86 52 Q84 62 76 60 Q70 58 72 50 Z" fill="#e8d0b0" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Tail (curled up) -->
  <path d="M90 82 Q112 78 114 68 Q116 58 106 56" fill="none" stroke="#f5e6c8" stroke-width="10" stroke-linecap="round"/>
  <path d="M90 82 Q112 78 114 68 Q116 58 106 56" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="42" y="106" width="10" height="18" rx="5" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="56" y="106" width="10" height="18" rx="5" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="70" y="106" width="10" height="16" rx="5" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="3"/>
</svg>
