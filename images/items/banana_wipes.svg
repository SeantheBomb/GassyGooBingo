<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- PowerPoint slide with banana transitions -->
  <!-- Laptop/monitor showing slide -->
  <rect x="8" y="16" width="112" height="80" rx="6" fill="#2c3e50" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Screen -->
  <rect x="14" y="22" width="100" height="68" rx="3" fill="#f0f0f0"/>
  <!-- Slide content -->
  <rect x="14" y="22" width="100" height="10" fill="#3498db"/>
  <text x="64" y="31" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">SLIDE TRANSITION:</text>
  <!-- Banana slide transition effect -->
  <!-- Banana 1 (flying across screen) -->
  <path d="M18 50 Q28 38 42 44 Q48 46 42 52 Q28 58 18 50 Z" fill="#f1c40f" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-30 30 48)"/>
  <!-- Banana 2 -->
  <path d="M50 48 Q60 36 74 42 Q80 44 74 50 Q60 56 50 48 Z" fill="#f1c40f" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-15 64 46)"/>
  <!-- Banana 3 -->
  <path d="M82 50 Q92 38 106 44 Q112 46 106 52 Q92 58 82 50 Z" fill="#f1c40f" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-20 96 48)"/>
  <!-- Motion arrows -->
  <path d="M20 66 L40 66 L36 62 M40 66 L36 70" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- PowerPoint logo hint -->
  <text x="20" y="84" font-family="sans-serif" font-size="7" fill="#e74c3c" font-weight="bold">PowerPoint</text>
  <!-- "WIPE" text -->
  <text x="85" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="#f1c40f">WIPE →</text>
  <!-- Laptop base -->
  <rect x="4" y="96" width="120" height="8" rx="3" fill="#34495e" stroke="#2a2a2a" stroke-width="2"/>
  <!-- "BANANA WIPES" label -->
  <text x="64" y="116" text-anchor="middle" font-family="monospace" font-size="8" fill="#f1c40f" font-weight="bold">BANANA WIPES</text>
  <text x="64" y="126" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">MVP2 presentation transitions</text>
</svg>
