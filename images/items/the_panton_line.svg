<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- The Panton Line - Andrew face merchandise collection -->
  <!-- Andrew face sunshade (car windshield accordion) -->
  <!-- Accordion folds -->
  <rect x="8" y="12" width="112" height="50" rx="4" fill="#e67e22" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Accordion fold lines -->
  <line x1="28" y1="12" x2="28" y2="62" stroke="#c8601a" stroke-width="2"/>
  <line x1="48" y1="12" x2="48" y2="62" stroke="#c8601a" stroke-width="2"/>
  <line x1="68" y1="12" x2="68" y2="62" stroke="#c8601a" stroke-width="2"/>
  <line x1="88" y1="12" x2="88" y2="62" stroke="#c8601a" stroke-width="2"/>
  <line x1="108" y1="12" x2="108" y2="62" stroke="#c8601a" stroke-width="2"/>
  <!-- Andrew face on sunshade (simplified) -->
  <circle cx="38" cy="36" r="12" fill="#f5c6a0" stroke="#c8601a" stroke-width="1"/>
  <circle cx="35" cy="33" r="2.5" fill="#2a2a2a"/>
  <circle cx="41" cy="33" r="2.5" fill="#2a2a2a"/>
  <path d="M34 40 Q38 44 42 40" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Same face repeated -->
  <circle cx="78" cy="36" r="12" fill="#f5c6a0" stroke="#c8601a" stroke-width="1"/>
  <circle cx="75" cy="33" r="2.5" fill="#2a2a2a"/>
  <circle cx="81" cy="33" r="2.5" fill="#2a2a2a"/>
  <path d="M74 40 Q78 44 82 40" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Balaclava with Andrew face -->
  <ellipse cx="30" cy="90" rx="18" ry="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Face cutout on balaclava -->
  <ellipse cx="30" cy="92" rx="12" ry="14" fill="#f5c6a0"/>
  <circle cx="27" cy="88" r="2" fill="#2a2a2a"/>
  <circle cx="33" cy="88" r="2" fill="#2a2a2a"/>
  <path d="M26 96 Q30 100 34 96" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Koozie with Andrew face -->
  <rect x="56" y="74" width="30" height="38" rx="4" fill="#e67e22" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="71" cy="92" r="10" fill="#f5c6a0"/>
  <circle cx="68" cy="89" r="2" fill="#2a2a2a"/>
  <circle cx="74" cy="89" r="2" fill="#2a2a2a"/>
  <!-- PANTON label -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#e67e22" font-weight="bold">THE PANTON LINE</text>
  <text x="64" y="8" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">what can we put Andrew's face on?</text>
</svg>
