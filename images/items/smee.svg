<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Cat body (Gavin's cat, orange tabby) -->
  <ellipse cx="64" cy="86" rx="34" ry="30" fill="#e88030" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Tail (curling up) -->
  <path d="M96 90 Q118 86 116 70 Q114 58 104 60" fill="none" stroke="#e88030" stroke-width="12" stroke-linecap="round"/>
  <path d="M96 90 Q118 86 116 70 Q114 58 104 60" fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Tail tip -->
  <circle cx="104" cy="60" r="8" fill="#c86020" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="64" cy="54" rx="30" ry="28" fill="#e88030" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Ears (pointy) -->
  <polygon points="40,34 32,12 54,28" fill="#e88030" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="88,34 96,12 74,28" fill="#e88030" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="42,32 36,16 54,28" fill="#ffb6c1"/>
  <polygon points="86,32 92,16 74,28" fill="#ffb6c1"/>
  <!-- Face -->
  <!-- Eyes (green cat eyes) -->
  <ellipse cx="50" cy="50" rx="10" ry="12" fill="#27ae60" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="78" cy="50" rx="10" ry="12" fill="#27ae60" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Pupils (vertical slit) -->
  <ellipse cx="50" cy="50" rx="4" ry="10" fill="#2a2a2a"/>
  <ellipse cx="78" cy="50" rx="4" ry="10" fill="#2a2a2a"/>
  <!-- Eye shine -->
  <circle cx="52" cy="46" r="2.5" fill="#fff"/>
  <circle cx="80" cy="46" r="2.5" fill="#fff"/>
  <!-- Nose -->
  <polygon points="64,60 60,64 68,64" fill="#ff69b4" stroke="#2a2a2a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M60 66 Q64 70 68 66" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="36" y1="60" x2="56" y2="64" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="65" x2="56" y2="66" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="64" x2="92" y2="60" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="66" x2="94" y2="65" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tabby stripes on body -->
  <path d="M42 78 Q52 74 60 78" fill="none" stroke="#c86020" stroke-width="3" stroke-linecap="round"/>
  <path d="M68 78 Q76 74 84 78" fill="none" stroke="#c86020" stroke-width="3" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="46" cy="112" rx="12" ry="8" fill="#e88030" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="82" cy="112" rx="12" ry="8" fill="#e88030" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Toe beans -->
  <circle cx="40" cy="114" r="3" fill="#ffb6c1"/>
  <circle cx="46" cy="116" r="3" fill="#ffb6c1"/>
  <circle cx="52" cy="114" r="3" fill="#ffb6c1"/>
</svg>
