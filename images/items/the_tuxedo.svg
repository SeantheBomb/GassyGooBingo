<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Tuxedo jacket (the one from the Jackie Chan movie) -->
  <!-- Jacket body -->
  <path d="M20 60 Q18 48 28 44 L52 36 L64 48 L76 36 L100 44 Q110 48 108 60 L108 112 L20 112 Z" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Lapels (white) -->
  <path d="M52 36 L46 52 L64 60 L82 52 L76 36 L64 48 Z" fill="#f5f5f5" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Bow tie -->
  <path d="M56 54 L64 58 L72 54 L68 62 L64 58 L60 62 Z" fill="#e74c3c" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Shirt buttons -->
  <circle cx="64" cy="68" r="3" fill="#f5f5f5"/>
  <circle cx="64" cy="78" r="3" fill="#f5f5f5"/>
  <circle cx="64" cy="88" r="3" fill="#f5f5f5"/>
  <!-- Pocket square -->
  <path d="M86 60 L96 60 L94 52 L88 52 Z" fill="#f5f5f5"/>
  <!-- Jacket buttons -->
  <circle cx="56" cy="84" r="3" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="72" cy="84" r="3" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Sleeves -->
  <path d="M20 60 L14 90 L28 94 L32 70" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M108 60 L114 90 L100 94 L96 70" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cufflinks -->
  <rect x="18" y="88" width="10" height="6" rx="2" fill="#c8a030"/>
  <rect x="100" y="88" width="10" height="6" rx="2" fill="#c8a030"/>
  <!-- Jackie Chan reference -->
  <text x="64" y="16" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#888">Jackie Chan movie</text>
  <!-- Head silhouette above tuxedo -->
  <circle cx="64" cy="28" r="16" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="64" cy="22" rx="12" ry="8" fill="#1a1a1a"/>
</svg>
