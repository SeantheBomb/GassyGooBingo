<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dodge the Bov - Russian roulette with popsicles -->
  <!-- Spinning wheel / selection device -->
  <circle cx="64" cy="56" r="44" fill="#2c3e50" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Wheel segments (6 flavours) -->
  <path d="M64 56 L64 12 A44 44 0 0 1 100 34 Z" fill="#8B4513"/><!-- Bovril (brown - BAD) -->
  <path d="M64 56 L100 34 A44 44 0 0 1 108 56 Z" fill="#f5f5f5"/><!-- Salad cream -->
  <path d="M64 56 L108 56 A44 44 0 0 1 100 78 Z" fill="#f4a460"/><!-- Pancake batter -->
  <path d="M64 56 L100 78 A44 44 0 0 1 64 100 Z" fill="#ffd700"/><!-- Apple juice -->
  <path d="M64 56 L64 100 A44 44 0 0 1 28 78 Z" fill="#1a1a1a"/><!-- Coke -->
  <path d="M64 56 L28 78 A44 44 0 0 1 20 56 Z" fill="#27ae60"/><!-- Mountain Dew -->
  <path d="M64 56 L20 56 A44 44 0 0 1 64 12 Z" fill="#ff0000" opacity="0.2"/><!-- Back to bovril -->
  <!-- Divider lines -->
  <line x1="64" y1="56" x2="64" y2="12" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="100" y2="34" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="108" y2="56" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="100" y2="78" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="64" y2="100" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="28" y2="78" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="64" y1="56" x2="20" y2="56" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Centre -->
  <circle cx="64" cy="56" r="8" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Bovril label (the dangerous one) -->
  <text x="78" y="26" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="bold">BOV</text>
  <!-- Pointer -->
  <polygon points="64,4 60,16 68,16" fill="#e74c3c" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Popsicle at bottom -->
  <rect x="56" y="102" width="6" height="20" rx="2" fill="#c8a030"/>
  <ellipse cx="59" cy="102" rx="10" ry="6" fill="#8B4513"/>
  <!-- Label -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B4513" font-weight="bold">DODGE THE BOV</text>
</svg>
