  <circle cx="40" cy="66" r="2" fill="#4a2a08"/>
  <circle cx="44" cy="70" r="2" fill="#4a2a08"/>
  <circle cx="65" cy="68" r="2" fill="#4a2a08"/>
  <circle cx="70" cy="72" r="2" fill="#4a2a08"/>
