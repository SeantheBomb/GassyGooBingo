  <text x="64" y="36" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#8B4513">TWIGLETS</text>
  <text x="64" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5a3010">MARMITE FLAVOUR</text>
