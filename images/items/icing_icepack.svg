<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Piping/icing bag shape -->
  <path d="M28 20 Q26 14 32 12 L82 12 Q88 14 86 20 L70 98 Q66 106 64 106 Q62 106 58 98 Z" fill="#f0e8ff" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Bag twisted top -->
  <ellipse cx="57" cy="14" rx="28" ry="8" fill="#d8c8f0" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Twist tie / rubber band at top -->
  <ellipse cx="57" cy="22" rx="20" ry="6" fill="#9370db" stroke="#2a2a2a" stroke-width="3"/>
  <!-- White icing colour on bag -->
  <path d="M32 20 L60 96 L66 96 L86 22 L72 20 Z" fill="#fff" opacity="0.4"/>
  <!-- ICE CRYSTALS on the bag (it's an ice pack!) -->
  <!-- Snowflake 1 -->
  <g transform="translate(42, 50)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#74b9ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#74b9ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#74b9ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#74b9ff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Snowflake 2 -->
  <g transform="translate(72, 68)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#74b9ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#74b9ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#74b9ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#74b9ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Cold sweat/drips on outside of bag -->
  <path d="M28 44 Q22 52 26 58" fill="none" stroke="#74b9ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M30 68 Q24 76 28 82" fill="none" stroke="#74b9ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Icing nozzle tip -->
  <polygon points="58,104 64,120 70,104" fill="#888" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
</svg>
