<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Willard Scott - weatherman who created Ronald McDonald -->
  <!-- Weather map background -->
  <rect x="6" y="6" width="116" height="116" rx="8" fill="#87ceeb"/>
  <!-- Weather symbols in background -->
  <text x="20" y="36" font-size="20" font-family="sans-serif">☀️</text>
  <text x="80" y="30" font-size="16" font-family="sans-serif">🌤️</text>
  <text x="96" y="70" font-size="14" font-family="sans-serif">🌧️</text>
  <!-- The clown costume (Willard played Bozo the Clown) -->
  <!-- Clown suit body -->
  <ellipse cx="64" cy="88" rx="30" ry="28" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Ruffled clown collar -->
  <path d="M36 66 Q64 58 92 66 Q80 74 64 72 Q48 74 36 66 Z" fill="#f5f5f5" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Clown head -->
  <circle cx="64" cy="52" r="24" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Clown face paint -->
  <!-- White face -->
  <ellipse cx="64" cy="52" rx="20" ry="20" fill="#fff" opacity="0.4"/>
  <!-- Red nose (BIG) -->
  <circle cx="64" cy="56" r="7" fill="#e74c3c" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="54" cy="48" r="4" fill="#2a2a2a"/>
  <circle cx="74" cy="48" r="4" fill="#2a2a2a"/>
  <circle cx="56" cy="46.5" r="1.5" fill="#fff"/>
  <circle cx="76" cy="46.5" r="1.5" fill="#fff"/>
  <!-- Clown smile -->
  <path d="M50 62 Q64 74 78 62" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Clown hair (orange fluffy) -->
  <circle cx="38" cy="48" r="12" fill="#e67e22" opacity="0.8"/>
  <circle cx="90" cy="48" r="12" fill="#e67e22" opacity="0.8"/>
  <!-- TODAY SHOW microphone -->
  <rect x="92" y="70" width="6" height="20" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
  <ellipse cx="95" cy="68" rx="7" ry="5" fill="#555"/>
  <!-- Labels -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">created Ronald McDonald</text>
  <text x="64" y="8" text-anchor="middle" font-family="monospace" font-size="7" fill="#2c3e50" font-weight="bold">WILLARD SCOTT</text>
</svg>
