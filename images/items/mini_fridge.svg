<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mic stand pole coming out of top -->
  <rect x="60" y="4" width="8" height="28" fill="#888" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Mic head -->
  <ellipse cx="64" cy="8" rx="14" ry="8" fill="#555" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Mic grille -->
  <ellipse cx="64" cy="8" rx="10" ry="5" fill="#777"/>
  <!-- Arrow/label: "NOT A MIC STAND" -->
  <path d="M78 16 L92 12" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <text x="94" y="14" font-family="monospace" font-size="7" fill="#e74c3c">NOT A MIC STAND</text>
  <!-- Mini fridge body -->
  <rect x="28" y="30" width="72" height="90" rx="6" fill="#ecf0f1" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Freezer compartment (top section) -->
  <rect x="28" y="30" width="72" height="30" rx="6" fill="#bdc3c7" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Divider between sections -->
  <line x1="28" y1="60" x2="100" y2="60" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Handle (right side) -->
  <rect x="96" y="42" width="8" height="30" rx="4" fill="#bdc3c7" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Freezer interior glimpse -->
  <rect x="36" y="36" width="54" height="20" rx="3" fill="#d5dde0"/>
  <!-- Ice cubes in freezer -->
  <rect x="40" y="40" width="12" height="12" rx="2" fill="#a8d8f0" stroke="#88b8d0" stroke-width="1.5"/>
  <rect x="56" y="40" width="12" height="12" rx="2" fill="#a8d8f0" stroke="#88b8d0" stroke-width="1.5"/>
  <!-- Main fridge shelf -->
  <line x1="34" y1="84" x2="94" y2="84" stroke="#bdc3c7" stroke-width="3"/>
  <!-- Drink can on shelf -->
  <rect x="42" y="70" width="16" height="14" rx="3" fill="#e74c3c" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Apple on shelf -->
  <circle cx="76" cy="76" r="8" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M76 68 Q78 62 82 64" fill="none" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
</svg>
