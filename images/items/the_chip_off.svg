  <ellipse cx="23" cy="28" rx="13" ry="5" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <text x="23" y="68" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" transform="rotate(-90 23 68)">PRINGLES</text>
  <!-- Packet 2 -->
