<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Stack of pillows (getting narrower at top) -->
  <!-- Pillow 1 (bottom, widest) - regulation pillow -->
  <rect x="10" y="100" width="108" height="22" rx="8" fill="#e8d8f0" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="100" rx="48" ry="8" fill="#d8c0e8" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow 2 -->
  <rect x="14" y="82" width="100" height="22" rx="8" fill="#c8d8f8" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="82" rx="44" ry="7" fill="#b8c8f0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow 3 -->
  <rect x="18" y="65" width="92" height="21" rx="8" fill="#f8e8c8" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="65" rx="40" ry="7" fill="#e8d0b0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow 4 -->
  <rect x="22" y="49" width="84" height="20" rx="7" fill="#c8f0d8" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="49" rx="36" ry="6" fill="#b0e0c0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow 5 (body pillow - taller) -->
  <rect x="27" y="24" width="74" height="29" rx="10" fill="#f0c8c8" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="24" rx="32" ry="8" fill="#e0b0b0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow 6 (body pillow 2) -->
  <rect x="32" y="6" width="64" height="22" rx="8" fill="#e8f0c8" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="6" rx="28" ry="7" fill="#d8e0b0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- ZZZ floating above -->
  <text x="96" y="18" font-family="monospace" font-size="12" fill="#9370db" font-weight="bold" opacity="0.8">z</text>
  <text x="104" y="10" font-family="monospace" font-size="14" fill="#9370db" font-weight="bold" opacity="0.7">z</text>
  <text x="112" y="4" font-family="monospace" font-size="16" fill="#9370db" font-weight="bold" opacity="0.6">z</text>
  <!-- Pillow count badge -->
  <circle cx="14" cy="110" r="10" fill="#9370db" stroke="#fff" stroke-width="2"/>
  <text x="14" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff" font-weight="bold">8</text>
</svg>
