<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mysterious dark background -->
  <rect width="128" height="128" fill="#0a0014"/>
  <!-- Spotlight effect -->
  <radialGradient id="spot67" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8e44ad" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#8e44ad" stop-opacity="0"/>
  </radialGradient>
  <rect width="128" height="128" fill="url(#spot67)"/>
  <!-- The number 67, large and enigmatic -->
  <text x="64" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#8e44ad">67</text>
  <!-- Mystery question marks floating around -->
  <text x="18" y="36" font-family="monospace" font-size="18" fill="#8e44ad" opacity="0.5">?</text>
  <text x="102" y="28" font-family="monospace" font-size="14" fill="#8e44ad" opacity="0.4">?</text>
  <text x="108" y="96" font-family="monospace" font-size="16" fill="#8e44ad" opacity="0.45">?</text>
  <text x="10" y="100" font-family="monospace" font-size="12" fill="#8e44ad" opacity="0.35">?</text>
  <!-- "IT'S A MYSTERY" label -->
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="8" fill="#8e44ad" letter-spacing="1">IT'S A MYSTERY</text>
  <!-- Glowing underline -->
  <line x1="24" y1="88" x2="104" y2="88" stroke="#8e44ad" stroke-width="2" opacity="0.5"/>
</svg>
