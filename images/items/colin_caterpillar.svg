<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Body segments (chocolate swiss roll cake) -->
  <ellipse cx="106" cy="72" rx="16" ry="14" fill="#3a1800" stroke="#2a2a2a" stroke-width="4"/>
  <ellipse cx="88" cy="68" rx="16" ry="16" fill="#4a2200" stroke="#2a2a2a" stroke-width="4"/>
  <ellipse cx="68" cy="66" rx="16" ry="16" fill="#3a1800" stroke="#2a2a2a" stroke-width="4"/>
  <ellipse cx="48" cy="68" rx="16" ry="16" fill="#4a2200" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Swiss roll spiral on segments -->
  <path d="M84 62 Q88 66 84 74" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 60 Q68 64 64 72" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  <!-- Head (green!) -->
  <circle cx="28" cy="66" r="22" fill="#27ae60" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Face -->
  <circle cx="22" cy="60" r="5" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="22" cy="60" r="2.5" fill="#2a2a2a"/>
  <circle cx="23" cy="59" r="1" fill="#fff"/>
  <!-- Smile -->
  <path d="M18 70 Q28 78 38 70" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Antennae -->
  <line x1="22" y1="44" x2="16" y2="28" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="34" y1="44" x2="40" y2="28" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="16" cy="28" r="4" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="40" cy="28" r="4" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="46" y1="82" x2="42" y2="96" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="80" x2="62" y2="94" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="86" y1="82" x2="82" y2="96" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
</svg>
