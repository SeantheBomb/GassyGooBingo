<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Golf cart - if Andrew was a car -->
  <!-- Cart body -->
  <path d="M14 68 Q12 54 22 50 L82 50 Q92 50 96 58 L100 68 Z" fill="#27ae60" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Roof/canopy -->
  <path d="M22 50 L26 28 L80 28 L82 50 Z" fill="#27ae60" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Canopy supports -->
  <line x1="28" y1="50" x2="28" y2="28" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="78" y1="50" x2="78" y2="28" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Windscreen -->
  <path d="M28 50 L32 32 L74 32 L78 50 Z" fill="#a8d8f0" stroke="#2a2a2a" stroke-width="1.5" opacity="0.7"/>
  <!-- Seat -->
  <rect x="40" y="54" width="36" height="10" rx="4" fill="#1e8449" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Steering wheel -->
  <circle cx="56" cy="54" r="8" fill="none" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="56" y1="46" x2="56" y2="54" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cart frame -->
  <rect x="14" y="68" width="86" height="16" rx="4" fill="#1e8449" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Wheels -->
  <circle cx="30" cy="90" r="14" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="30" cy="90" r="7" fill="#333"/>
  <circle cx="86" cy="90" r="14" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="86" cy="90" r="7" fill="#333"/>
  <!-- Bag holder at back -->
  <rect x="96" y="58" width="18" height="28" rx="3" fill="#c8a030" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Golf bag -->
  <rect x="100" y="52" width="10" height="36" rx="5" fill="#2980b9" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="102" y1="52" x2="108" y2="52" stroke="#c8a030" stroke-width="2"/>
  <!-- ANDREW label on side -->
  <text x="56" y="80" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff" font-weight="bold">ANDREW</text>
  <text x="64" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#27ae60">if Andrew was a car</text>
</svg>
