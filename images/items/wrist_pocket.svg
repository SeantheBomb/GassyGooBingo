<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Forearm/wrist (shown from front) -->
  <!-- Sleeve -->
  <rect x="28" y="8" width="72" height="40" rx="6" fill="#3498db" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Arm skin below sleeve -->
  <rect x="28" y="44" width="72" height="70" rx="8" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="4"/>
  <!-- THE POCKET (small, stitched on the wrist) -->
  <rect x="44" y="76" width="40" height="30" rx="4" fill="#fff" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Pocket opening (top open) -->
  <rect x="44" y="76" width="40" height="6" rx="2" fill="#ddd" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stitching lines on pocket -->
  <line x1="48" y1="82" x2="48" y2="102" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="80" y1="82" x2="80" y2="102" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="44" y1="98" x2="84" y2="98" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- A tiny item in the pocket (the utility!) -->
  <!-- Little receipt or card sticking out -->
  <rect x="56" y="70" width="16" height="12" rx="2" fill="#fff" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="58" y1="74" x2="70" y2="74" stroke="#888" stroke-width="1"/>
  <line x1="58" y1="77" x2="70" y2="77" stroke="#888" stroke-width="1"/>
  <!-- Arrow pointing to pocket -->
  <path d="M88 90 L100 82" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <polygon points="100,82 96,90 104,88" fill="#e74c3c"/>
  <text x="102" y="78" font-family="monospace" font-size="6" fill="#e74c3c">POCKET</text>
  <!-- Wrist bone bumps -->
  <ellipse cx="32" cy="96" rx="5" ry="4" fill="#e8b090" stroke="#d09070" stroke-width="1"/>
  <ellipse cx="96" cy="96" rx="5" ry="4" fill="#e8b090" stroke="#d09070" stroke-width="1"/>
  <!-- Hand suggestion at bottom -->
  <path d="M40 114 Q36 124 38 126" stroke="#f5c6a0" stroke-width="8" stroke-linecap="round"/>
  <path d="M52 116 Q50 126 52 128" stroke="#f5c6a0" stroke-width="7" stroke-linecap="round"/>
  <path d="M64 116 Q64 128 64 128" stroke="#f5c6a0" stroke-width="7" stroke-linecap="round"/>
  <path d="M76 116 Q78 126 76 128" stroke="#f5c6a0" stroke-width="7" stroke-linecap="round"/>
  <path d="M86 114 Q90 122 88 126" stroke="#f5c6a0" stroke-width="7" stroke-linecap="round"/>
</svg>
