<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Coolio - the podcast's first rival (didn't know it) -->
  <!-- Gold background aura (he was famous) -->
  <circle cx="64" cy="58" r="50" fill="#c8a030" opacity="0.2"/>
  <!-- Silhouette figure (Coolio) -->
  <!-- Body -->
  <ellipse cx="64" cy="88" rx="28" ry="24" fill="#2c3e50"/>
  <!-- Head -->
  <circle cx="64" cy="56" r="26" fill="#c8864a" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Coolio's ICONIC braids/hair sticking up -->
  <path d="M46 36 Q42 20 44 12 Q46 8 50 10 Q52 12 50 20" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M54 32 Q50 14 52 8 Q54 4 58 6 Q60 8 58 18" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M64 30 Q62 12 64 6 Q66 2 70 4 Q72 8 70 18" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M74 32 Q76 14 74 8 Q76 4 80 6 Q82 10 80 20" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M82 36 Q86 18 84 12 Q86 8 90 10 Q92 14 88 22" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Face -->
  <circle cx="54" cy="54" r="5" fill="#1a1a1a"/>
  <circle cx="74" cy="54" r="5" fill="#1a1a1a"/>
  <circle cx="55.5" cy="52.5" r="2" fill="#fff"/>
  <circle cx="75.5" cy="52.5" r="2" fill="#fff"/>
  <path d="M52 66 Q64 74 76 66" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Microphone (he was a rapper) -->
  <rect x="96" y="60" width="6" height="20" rx="3" fill="#888" stroke="#666" stroke-width="1.5"/>
  <ellipse cx="99" cy="58" rx="7" ry="5" fill="#555" stroke="#444" stroke-width="1"/>
  <!-- RIVAL badge -->
  <rect x="20" y="100" width="88" height="18" rx="6" fill="#e74c3c"/>
  <text x="64" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff" font-weight="bold">PODCAST RIVAL #1</text>
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">he didn't know it</text>
</svg>
