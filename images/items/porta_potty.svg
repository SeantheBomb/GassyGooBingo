<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Main body -->
  <rect x="20" y="24" width="88" height="94" rx="6" fill="#ff69b4" stroke="#2a2a2a" stroke-width="5"/>
  <!-- Roof (slightly sloped) -->
  <path d="M16 24 L112 24 L108 10 L20 10 Z" fill="#e05090" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Ventilation on roof -->
  <rect x="52" y="12" width="24" height="8" rx="3" fill="#c03070" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Door panel -->
  <rect x="36" y="44" width="56" height="62" rx="4" fill="#e05090" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Door handle -->
  <circle cx="80" cy="74" r="4" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Occupancy indicator (vacant = green) -->
  <rect x="48" y="50" width="32" height="12" rx="3" fill="#27ae60" stroke="#2a2a2a" stroke-width="2"/>
  <text x="64" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff" font-weight="bold">VACANT</text>
  <!-- Door window -->
  <rect x="48" y="68" width="24" height="18" rx="3" fill="#ffb6d4" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cross/plus ventilation slits -->
  <line x1="60" y1="68" x2="60" y2="86" stroke="#e05090" stroke-width="2"/>
  <line x1="48" y1="77" x2="72" y2="77" stroke="#e05090" stroke-width="2"/>
  <!-- Andrew's gift tag -->
  <path d="M20 36 L8 30 L8 44 Z" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#e05090" font-weight="bold">♥ FROM ANDREW</text>
</svg>
