<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Exploding ear syndrome - loud noise when falling asleep -->
  <!-- Bed/pillow suggestion -->
  <rect x="4" y="86" width="120" height="30" rx="6" fill="#b0c4de" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pillow -->
  <ellipse cx="64" cy="86" rx="50" ry="14" fill="#e8e0d0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Person sleeping -->
  <!-- Head on pillow -->
  <circle cx="50" cy="80" r="20" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Eye closed (sleeping) -->
  <path d="M42 78 Q50 74 58 78" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- ZZZ -->
  <text x="28" y="62" font-family="monospace" font-size="10" fill="#888" font-weight="bold">z</text>
  <text x="20" y="52" font-family="monospace" font-size="12" fill="#888" font-weight="bold">z</text>
  <text x="12" y="40" font-family="monospace" font-size="14" fill="#888" font-weight="bold">z</text>
  <!-- EAR with EXPLOSION coming out of it -->
  <path d="M68 70 Q70 64 74 62 Q80 60 82 66 Q84 72 78 76 Q72 78 68 76 Z" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Explosion burst from ear -->
  <path d="M82 62 Q90 48 102 44 Q114 40 118 50 Q122 60 114 66 Q106 72 96 66 Q88 60 82 62 Z" fill="#f1c40f" stroke="#e74c3c" stroke-width="2"/>
  <path d="M90 48 L94 36 L98 50 L110 42 L104 56" fill="#f1c40f" stroke="#e74c3c" stroke-width="2" stroke-linejoin="round"/>
  <!-- BOOM text -->
  <text x="98" y="58" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#e74c3c">BOOM</text>
  <!-- Sound waves -->
  <path d="M82 54 Q86 50 90 54" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="64" y="120" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">when falling asleep</text>
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c" font-weight="bold">EXPLODING EAR SYNDROME</text>
</svg>
