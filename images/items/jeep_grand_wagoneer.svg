<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Jeep Grand Wagoneer with wood paneling - if Geoff was a car -->
  <!-- Car body -->
  <path d="M8 72 Q8 56 18 52 L40 44 L88 44 L110 52 Q120 56 120 72 L120 90 L8 90 Z" fill="#c8a030" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Roof -->
  <path d="M36 44 L44 28 L84 28 L92 44 Z" fill="#c8a030" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Wood paneling on sides (the key detail!) -->
  <rect x="14" y="66" width="40" height="20" rx="2" fill="#8B4513" stroke="#6a3010" stroke-width="1.5"/>
  <!-- Wood grain lines -->
  <line x1="14" y1="72" x2="54" y2="72" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <line x1="14" y1="78" x2="54" y2="78" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <line x1="14" y1="84" x2="54" y2="84" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <line x1="24" y1="66" x2="24" y2="86" stroke="#6a3010" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="66" x2="34" y2="86" stroke="#6a3010" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="66" x2="44" y2="86" stroke="#6a3010" stroke-width="1" opacity="0.5"/>
  <!-- Wood paneling right side -->
  <rect x="74" y="66" width="40" height="20" rx="2" fill="#8B4513" stroke="#6a3010" stroke-width="1.5"/>
  <line x1="74" y1="72" x2="114" y2="72" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <line x1="74" y1="78" x2="114" y2="78" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <line x1="74" y1="84" x2="114" y2="84" stroke="#6a3010" stroke-width="1" opacity="0.7"/>
  <!-- Windows -->
  <rect x="46" y="32" width="16" height="14" rx="3" fill="#a8d8f0"/>
  <rect x="66" y="32" width="16" height="14" rx="3" fill="#a8d8f0"/>
  <!-- Headlights -->
  <rect x="10" y="60" width="12" height="8" rx="2" fill="#f1c40f"/>
  <rect x="106" y="60" width="12" height="8" rx="2" fill="#f1c40f"/>
  <!-- Wheels -->
  <circle cx="30" cy="98" r="14" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="30" cy="98" r="7" fill="#333"/>
  <circle cx="98" cy="98" r="14" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="98" cy="98" r="7" fill="#333"/>
  <!-- GEOFF label -->
  <text x="64" y="78" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B4513" font-weight="bold">GEOFF</text>
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">Jeep Grand Wagoneer</text>
  <text x="64" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#c8a030">with wood paneling</text>
</svg>
