<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Soda can being chugged -->
  <!-- Can body -->
  <rect x="36" y="24" width="56" height="80" rx="8" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Can top -->
  <ellipse cx="64" cy="24" rx="28" ry="8" fill="#c0392b" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Can bottom -->
  <ellipse cx="64" cy="104" rx="28" ry="8" fill="#c0392b" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pull tab (open/chugged) -->
  <path d="M56 16 L72 16 L70 24 L58 24 Z" fill="#c8c8c8" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Tab ring -->
  <path d="M64 12 Q68 8 72 12 Q72 16 68 16 Q64 16 64 12 Z" fill="#c8c8c8" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Can label -->
  <rect x="36" y="40" width="56" height="32" fill="#c0392b"/>
  <text x="64" y="54" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#fff" letter-spacing="1">SODA</text>
  <text x="64" y="66" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#fff" letter-spacing="1">CHUG</text>
  <!-- Soda liquid coming out (being chugged) -->
  <path d="M64 16 Q62 8 58 4 Q54 0 52 6" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- NO BURP constraint -->
  <rect x="20" y="86" width="88" height="20" rx="4" fill="#1a1a1a" stroke="#e74c3c" stroke-width="2"/>
  <text x="64" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c" font-weight="bold">NO BURP ALLOWED</text>
  <!-- Bubbles -->
  <circle cx="50" cy="76" r="3" fill="#ff9999" opacity="0.6"/>
  <circle cx="75" cy="72" r="2.5" fill="#ff9999" opacity="0.5"/>
  <circle cx="88" cy="78" r="3.5" fill="#ff9999" opacity="0.5"/>
</svg>
