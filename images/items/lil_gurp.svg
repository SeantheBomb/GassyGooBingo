  <circle cx="62" cy="56" r="3" fill="#8890a0"/>
  <circle cx="74" cy="58" r="3" fill="#8890a0"/>
  <circle cx="44" cy="68" r="3" fill="#8890a0"/>
  <circle cx="56" cy="66" r="3" fill="#8890a0"/>
  <circle cx="68" cy="66" r="3" fill="#8890a0"/>
  <circle cx="80" cy="68" r="3" fill="#8890a0"/>
  <circle cx="48" cy="78" r="3" fill="#8890a0"/>
  <circle cx="60" cy="76" r="3" fill="#8890a0"/>
  <circle cx="72" cy="76" r="3" fill="#8890a0"/>
  <circle cx="84" cy="78" r="3" fill="#8890a0"/>
  <!-- Band at bottom -->
  <rect x="36" y="86" width="56" height="8" rx="2" fill="#a0a8b8" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Open bottom -->
  <ellipse cx="64" cy="90" rx="28" ry="8" fill="#888898" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Metal shine -->
