<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- LIL GURP — a thimble-sized Gurpler cup -->
  <!-- Tiny cup body (same trapezoid shape as the Gurpler, just tiny) -->
  <path d="M38 54 L90 54 L82 100 L46 100 Z" fill="#4a7a3a" stroke="#2a2a2a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Rim -->
  <ellipse cx="64" cy="54" rx="26" ry="6" fill="#5a8a4a" stroke="#2a2a2a" stroke-width="3.5"/>
  <!-- Inside -->
  <ellipse cx="64" cy="54" rx="22" ry="4.5" fill="#2a4a1a"/>
  <!-- Ridges -->
  <path d="M40 64 Q64 61 88 64" fill="none" stroke="#3a6a2a" stroke-width="1.2" opacity="0.7"/>
  <path d="M42 74 Q64 71 86 74" fill="none" stroke="#3a6a2a" stroke-width="1.2" opacity="0.7"/>
  <path d="M44 84 Q64 81 84 84" fill="none" stroke="#3a6a2a" stroke-width="1.2" opacity="0.7"/>
  <!-- Light reflection -->
  <path d="M42 57 Q46 60 44 96" stroke="#6a9a5a" stroke-width="3" stroke-linecap="round" opacity="0.3" fill="none"/>
  <!-- Tiny "GURPLER" text -->
  <text x="64" y="73" text-anchor="middle" font-family="serif" font-style="italic" font-size="7" fill="#fff" opacity="0.9" font-weight="bold">GURPLER</text>
  <!-- Bottom -->
  <ellipse cx="64" cy="100" rx="18" ry="4" fill="#3a6a2a" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- "LIL" label above — context is that it's tiny, like a shot glass version -->
  <text x="64" y="44" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a7a3a" font-weight="bold">lil</text>
  <!-- Size comparison arrows (tiny vs normal) -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">a thimble</text>
  <!-- Tiny size context - a finger beside it -->
  <path d="M94 56 Q98 56 98 100 Q98 106 94 106" fill="none" stroke="#f5c6a0" stroke-width="8" stroke-linecap="round"/>
  <path d="M94 56 Q98 56 98 100 Q98 106 94 106" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
</svg>
