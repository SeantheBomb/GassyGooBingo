<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Movie poster background -->
  <rect x="8" y="4" width="112" height="120" rx="4" fill="#1a0a00" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Sky/court background on poster -->
  <rect x="8" y="4" width="112" height="70" rx="4" fill="#1a3a6a"/>
  <!-- Basketball court floor suggestion -->
  <rect x="8" y="68" width="112" height="56" rx="0" fill="#c8a030" opacity="0.3"/>
  <!-- Gorilla silhouette (Most Vertical Primate) -->
  <!-- Body -->
  <ellipse cx="64" cy="68" rx="22" ry="24" fill="#2a2a2a"/>
  <!-- Head -->
  <circle cx="64" cy="44" r="18" fill="#2a2a2a"/>
  <!-- Gorilla face details -->
  <ellipse cx="64" cy="50" rx="10" ry="7" fill="#3a3a3a"/>
  <circle cx="58" cy="44" r="4" fill="#1a1a1a"/>
  <circle cx="70" cy="44" r="4" fill="#1a1a1a"/>
  <circle cx="59" cy="43" r="1.5" fill="#fff"/>
  <circle cx="71" cy="43" r="1.5" fill="#fff"/>
  <!-- Gorilla arms raised holding basketball -->
  <path d="M42 56 Q30 44 28 34" fill="none" stroke="#2a2a2a" stroke-width="10" stroke-linecap="round"/>
  <path d="M86 56 Q98 44 100 34" fill="none" stroke="#2a2a2a" stroke-width="10" stroke-linecap="round"/>
  <!-- Basketball above head -->
  <circle cx="64" cy="22" r="14" fill="#e67e22" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M52 22 Q64 16 76 22" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M52 22 Q64 28 76 22" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="64" y1="8" x2="64" y2="36" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Title text -->
  <text x="64" y="100" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#f1c40f" letter-spacing="3">MVP2</text>
  <text x="64" y="112" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#c8c8c8">Most Vertical Primate</text>
  <text x="64" y="120" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">Andrew's childhood movie</text>
</svg>
