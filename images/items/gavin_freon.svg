<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Gavin Freon - Fridge Gavin -->
  <!-- Fridge body -->
  <rect x="18" y="12" width="92" height="108" rx="8" fill="#ecf0f1" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Fridge handle -->
  <rect x="96" y="44" width="8" height="30" rx="4" fill="#bdc3c7" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Freezer compartment divider -->
  <line x1="18" y1="50" x2="110" y2="50" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Freezer section -->
  <rect x="22" y="16" width="84" height="30" rx="4" fill="#d5e8f0"/>
  <!-- Gavin's face on the fridge -->
  <!-- Big Gavin-style face (British, blonde) -->
  <circle cx="64" cy="85" r="28" fill="#f5c6a0" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Gavin's distinctive hair -->
  <path d="M40 72 Q42 58 64 56 Q86 58 88 72" fill="#d4b040" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Blue eyes (Gavin's blue eyes) -->
  <ellipse cx="54" cy="80" rx="7" ry="8" fill="#3498db" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="74" cy="80" rx="7" ry="8" fill="#3498db" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="54" cy="81" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="74" cy="81" rx="4" ry="5" fill="#1a1a1a"/>
  <circle cx="56" cy="79" r="1.5" fill="#fff"/>
  <circle cx="76" cy="79" r="1.5" fill="#fff"/>
  <!-- Mouth (Gavin grin) -->
  <path d="M52 94 Q64 102 76 94" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ice crystals on face (FREON - it's cold) -->
  <text x="28" y="72" font-size="12" font-family="sans-serif">❄️</text>
  <text x="90" y="72" font-size="12" font-family="sans-serif">❄️</text>
  <!-- "GAVIN FREON" label on fridge door -->
  <text x="64" y="34" text-anchor="middle" font-family="monospace" font-size="8" fill="#2980b9" font-weight="bold">GAVIN FREON</text>
  <text x="64" y="44" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">fridge Gavin</text>
</svg>
