<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Xbox controller body -->
  <path d="M20 60 Q16 40 24 32 L38 28 Q50 24 56 32 L64 40 L72 32 Q78 24 90 28 L104 32 Q112 40 108 60 Q110 80 100 92 Q90 102 80 98 L64 90 L48 98 Q38 102 28 92 Q18 80 20 60 Z" fill="#1abc9c" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Controller grips -->
  <ellipse cx="38" cy="88" rx="18" ry="22" fill="#17a589" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="90" cy="88" rx="18" ry="22" fill="#17a589" stroke="#2a2a2a" stroke-width="3"/>
  <!-- D-pad (left side) -->
  <rect x="32" y="55" width="8" height="20" rx="2" fill="#2a2a2a"/>
  <rect x="26" y="61" width="20" height="8" rx="2" fill="#2a2a2a"/>
  <!-- ABXY buttons (right side) -->
  <circle cx="88" cy="58" r="5" fill="#27ae60"/>
  <circle cx="98" cy="64" r="5" fill="#c0392b"/>
  <circle cx="88" cy="70" r="5" fill="#f1c40f"/>
  <circle cx="78" cy="64" r="5" fill="#3498db"/>
  <!-- Left thumbstick (normal height for reference) -->
  <circle cx="50" cy="72" r="10" fill="#2a2a2a" stroke="#555" stroke-width="2"/>
  <!-- RIGHT THUMBSTICK (ABSURDLY TALL - the whole bit) -->
  <!-- Stick shaft going way up above the controller -->
  <rect x="80" y="-8" width="8" height="84" rx="4" fill="#333" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Thumbstick base on controller -->
  <circle cx="84" cy="78" r="10" fill="#2a2a2a" stroke="#555" stroke-width="2"/>
  <!-- Thumbstick cap (way up top) -->
  <circle cx="84" cy="-8" r="10" fill="#555" stroke="#2a2a2a" stroke-width="3"/>
  <circle cx="84" cy="-8" r="6" fill="#3a3a3a"/>
  <!-- Inch markers on the shaft -->
  <line x1="90" y1="20" x2="96" y2="20" stroke="#888" stroke-width="2"/>
  <line x1="90" y1="30" x2="94" y2="30" stroke="#888" stroke-width="1.5"/>
  <line x1="90" y1="40" x2="96" y2="40" stroke="#888" stroke-width="2"/>
  <line x1="90" y1="50" x2="94" y2="50" stroke="#888" stroke-width="1.5"/>
  <line x1="90" y1="60" x2="96" y2="60" stroke="#888" stroke-width="2"/>
  <!-- Measurement label -->
  <text x="100" y="24" font-family="monospace" font-size="6" fill="#888">2"</text>
  <text x="100" y="44" font-family="monospace" font-size="6" fill="#888">4"</text>
  <!-- WIN badge -->
  <circle cx="20" cy="20" r="14" fill="#f1c40f" stroke="#2a2a2a" stroke-width="2"/>
  <text x="20" y="24" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#2a2a2a">WIN</text>
</svg>
