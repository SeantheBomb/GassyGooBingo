<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <!-- ── DARK BASE STAND ── -->
  <rect x="18" y="112" width="92" height="14" rx="5" fill="#1e1816" stroke="#0e0c0a" stroke-width="1"/>
  <rect x="18" y="112" width="92" height="5" rx="4" fill="#fff" opacity="0.05"/>

  <!-- ── BREAD CLIP BODY (characteristic stepped shape) ── -->
  <!-- The classic bread tag silhouette: wide top, stepped sides, slot at bottom -->
  <path d="
    M30 8
    L98 8
    Q108 8 110 16
    L112 32
    L120 32
    L120 80
    L112 80
    L110 96
    Q108 106 98 108
    L30 108
    Q20 106 18 96
    L16 80
    L8  80
    L8  32
    L16 32
    L18 16
    Q20 8 30 8 Z"
    fill="#b8bcca" stroke="#7a7e8a" stroke-width="2"/>

  <!-- Metallic sheen — lighter top half -->
  <path d="M30 8 L98 8 Q108 8 110 16 L112 32 L120 32 L120 56 L8 56 L8 32 L16 32 L18 16 Q20 8 30 8 Z"
    fill="#dde0ec" opacity="0.55"/>

  <!-- Brushed metal texture lines (horizontal) -->
  <g stroke="#a0a4b0" stroke-width="0.4" opacity="0.35">
    <line x1="10" y1="42" x2="118" y2="42"/>
    <line x1="10" y1="50" x2="118" y2="50"/>
    <line x1="10" y1="58" x2="118" y2="58"/>
    <line x1="10" y1="66" x2="118" y2="66"/>
    <line x1="10" y1="74" x2="118" y2="74"/>
  </g>

  <!-- Top edge highlight -->
  <line x1="30" y1="9" x2="98" y2="9" stroke="#eef0f8" stroke-width="2"/>
  <!-- Left edge highlight -->
  <path d="M18 16 L16 32 L8 32 L8 56" fill="none" stroke="#cdd0dc" stroke-width="1.5"/>

  <!-- Clip slot opening (bottom centre, cut-out) -->
  <rect x="42" y="94" width="44" height="20" rx="10" fill="#d4d8e4" stroke="#9098a8" stroke-width="1"/>
  <!-- Slot inner shadow -->
  <rect x="44" y="96" width="40" height="16" rx="8" fill="#c0c4d0"/>

  <!-- ── F**K FACE LOGO — two stacked dark label blocks ── -->
  <!-- Top block: F**K -->
  <rect x="22" y="12" width="84" height="30" rx="4" fill="#1a1a1a"/>
  <text x="64" y="33" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="20" font-weight="900" fill="#fff" letter-spacing="2">F**K</text>

  <!-- Bottom block: FACE -->
  <rect x="22" y="44" width="84" height="28" rx="4" fill="#1a1a1a"/>
  <text x="64" y="64" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="20" font-weight="900" fill="#fff" letter-spacing="2">FACE</text>

  <!-- ── PERSON SILHOUETTE (F**K Face mascot) ── -->
  <!-- Head with cap -->
  <ellipse cx="64" cy="79" rx="10" ry="9" fill="#1a1a1a"/>
  <!-- Cap brim -->
  <rect x="52" y="71" width="24" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="50" y="73" width="28" height="3" rx="1.5" fill="#111"/>
  <!-- Shoulders / body -->
  <path d="M50 90 Q50 86 64 84 Q78 86 78 90 L80 96 L48 96 Z" fill="#1a1a1a"/>

  <!-- ── REGULATION BREAD CLIP text ── -->
  <text x="64" y="102" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="5.5" font-weight="700"
    fill="#2a2a2a" letter-spacing="0.5">REGULATION BREAD CLIP</text>

  <!-- ── UniFarm™ branding — rotated on right edge ── -->
  <text x="0" y="0"
    font-family="sans-serif" font-size="5" fill="#60646e" letter-spacing="0.5"
    transform="translate(117,72) rotate(-90)">UniFarm™</text>

  <!-- UniFarm small logo mark (U-in-square) -->
  <rect x="111" y="56" width="8" height="8" rx="2" fill="none" stroke="#70747e" stroke-width="1"/>
  <text x="115" y="63" text-anchor="middle"
    font-family="sans-serif" font-size="7" fill="#70747e" font-weight="bold">U</text>

</svg>
