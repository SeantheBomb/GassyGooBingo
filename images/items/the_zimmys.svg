<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Award trophy (The Zimmy's) -->
  <!-- Trophy base -->
  <rect x="42" y="108" width="44" height="12" rx="4" fill="#c8a030" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="36" y="116" width="56" height="8" rx="3" fill="#a87820" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Trophy stem -->
  <rect x="58" y="90" width="12" height="22" rx="3" fill="#c8a030" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Trophy cup -->
  <path d="M28 28 Q24 44 28 60 Q36 80 64 84 Q92 80 100 60 Q104 44 100 28 Z" fill="#ffd700" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Cup handles -->
  <path d="M28 36 Q12 40 14 56 Q16 68 28 66" fill="none" stroke="#c8a030" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 36 Q116 40 114 56 Q112 68 100 66" fill="none" stroke="#c8a030" stroke-width="6" stroke-linecap="round"/>
  <!-- Trophy face -->
  <ellipse cx="64" cy="54" rx="28" ry="24" fill="#c8a030" opacity="0.3"/>
  <!-- "THE ZIMMY'S" text -->
  <text x="64" y="44" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#8B6914">THE</text>
  <text x="64" y="56" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#8B6914">ZIMMY'S</text>
  <!-- Star -->
  <text x="64" y="72" text-anchor="middle" font-size="14" font-family="sans-serif">⭐</text>
  <!-- Shine on trophy -->
  <path d="M36 36 Q44 30 52 36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Label -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="7" fill="#c8a030">F**kface Podcast Award</text>
</svg>
