<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Frubes squeeze tube -->
  <!-- Tube body -->
  <rect x="44" y="16" width="40" height="88" rx="8" fill="#ff69b4" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Colour stripe -->
  <rect x="44" y="38" width="40" height="16" fill="#ff1493"/>
  <rect x="44" y="62" width="40" height="16" fill="#ff1493"/>
  <!-- Frubes logo area (white label) -->
  <rect x="48" y="44" width="32" height="26" rx="4" fill="#fff" opacity="0.9"/>
  <text x="64" y="54" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#ff1493">FRUBES</text>
  <text x="64" y="65" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">strawberry</text>
  <!-- Sealed crimp bottom -->
  <rect x="42" y="100" width="44" height="10" rx="3" fill="#cc1177" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Cap at top (twist cap) -->
  <ellipse cx="64" cy="16" rx="14" ry="8" fill="#e0e0e0" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="64" cy="12" rx="10" ry="6" fill="#ccc" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Yogurt squirt coming out -->
  <path d="M58 10 Q54 2 50 4" fill="none" stroke="#f5e6c8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="4" r="5" fill="#f5e6c8" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stripe highlights on tube -->
  <rect x="48" y="18" width="4" height="72" rx="2" fill="#fff" opacity="0.2"/>
</svg>
