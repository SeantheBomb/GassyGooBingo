<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Signal Awards trophy (BOOOO!) -->
  <!-- Trophy -->
  <rect x="44" y="104" width="40" height="10" rx="3" fill="#888" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="38" y="112" width="52" height="8" rx="3" fill="#666" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="56" y="88" width="16" height="18" rx="3" fill="#888" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cup -->
  <path d="M24 28 Q22 44 28 58 Q38 76 64 78 Q90 76 100 58 Q106 44 104 28 Z" fill="#888" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Handles -->
  <path d="M24 36 Q10 40 12 54 Q14 64 24 62" fill="none" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  <path d="M104 36 Q118 40 116 54 Q114 64 104 62" fill="none" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  <!-- "BOOO!" written across trophy face -->
