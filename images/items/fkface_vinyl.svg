<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Vinyl record - F**kface Episode 16 -->
  <!-- Outer sleeve/jacket -->
  <rect x="8" y="8" width="112" height="112" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <!-- Sleeve artwork -->
  <rect x="14" y="14" width="100" height="100" rx="4" fill="#2c3e50"/>
  <!-- F**KFACE text on sleeve -->
  <text x="64" y="40" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#fff">F**KFACE</text>
  <!-- Episode 16 on sleeve -->
  <text x="64" y="58" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" fill="#e74c3c">EPISODE 16</text>
  <!-- Limited edition badge -->
  <circle cx="100" cy="34" r="16" fill="#c8a030"/>
  <text x="100" y="30" text-anchor="middle" font-family="monospace" font-size="5" fill="#1a1a1a" font-weight="bold">LIMITED</text>
  <text x="100" y="38" text-anchor="middle" font-family="monospace" font-size="5" fill="#1a1a1a" font-weight="bold">EDITION</text>
  <!-- Vinyl disc peeking out of sleeve -->
  <circle cx="64" cy="84" r="34" fill="#111" stroke="#333" stroke-width="2"/>
  <circle cx="64" cy="84" r="28" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="64" cy="84" r="22" fill="none" stroke="#222" stroke-width="1"/>
  <!-- Red centre label -->
  <circle cx="64" cy="84" r="14" fill="#c0392b"/>
  <circle cx="64" cy="84" r="3" fill="#111"/>
  <text x="64" y="80" text-anchor="middle" font-family="monospace" font-size="5" fill="#fff">F**KFACE</text>
  <text x="64" y="87" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="bold">16</text>
  <!-- SOLD OUT stamp -->
  <text x="14" y="112" font-family="monospace" font-size="8" fill="#e74c3c" font-weight="bold" transform="rotate(-15 30 106)">SOLD OUT</text>
</svg>
