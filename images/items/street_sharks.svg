<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Shark body (upright, anthropomorphic) -->
  <ellipse cx="64" cy="72" rx="32" ry="40" fill="#4169e1" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Belly (lighter) -->
  <ellipse cx="64" cy="78" rx="20" ry="28" fill="#e0e8ff"/>
  <!-- Head (shark head) -->
  <ellipse cx="64" cy="38" rx="28" ry="26" fill="#4169e1" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Snout (flat, forward-jutting shark jaw) -->
  <path d="M38 46 Q30 52 36 60 Q42 66 50 60 L50 50 Z" fill="#4169e1" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Teeth (visible) -->
  <path d="M36 56 L40 62 L44 56 L48 62 L50 58" fill="#fff" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Eyes (mean, street-tough) -->
  <ellipse cx="58" cy="34" rx="8" ry="9" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="78" cy="34" rx="8" ry="9" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="58" cy="34" rx="4" ry="5" fill="#2a2a2a"/>
  <ellipse cx="78" cy="34" rx="4" ry="5" fill="#2a2a2a"/>
  <!-- Mean eyebrow (street attitude) -->
  <line x1="50" y1="26" x2="66" y2="30" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="30" x2="86" y2="26" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Dorsal fin on back -->
  <polygon points="96,36 108,12 96,52" fill="#4169e1" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- STREET OUTFIT -->
  <!-- Backwards cap -->
  <path d="M44 20 Q64 10 84 20 Q82 12 64 8 Q46 12 44 20 Z" fill="#e74c3c" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cap brim (backwards) -->
  <path d="M36 26 Q44 20 56 22" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Sneakers on fins/feet -->
  <ellipse cx="44" cy="112" rx="16" ry="8" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="84" cy="112" rx="16" ry="8" fill="#e74c3c" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Sneaker lace detail -->
  <line x1="38" y1="110" x2="50" y2="110" stroke="#fff" stroke-width="2"/>
  <line x1="78" y1="110" x2="90" y2="110" stroke="#fff" stroke-width="2"/>
  <!-- Arms/fins -->
  <ellipse cx="30" cy="76" rx="12" ry="18" fill="#4169e1" stroke="#2a2a2a" stroke-width="3" transform="rotate(20 30 76)"/>
  <ellipse cx="98" cy="76" rx="12" ry="18" fill="#4169e1" stroke="#2a2a2a" stroke-width="3" transform="rotate(-20 98 76)"/>
</svg>
