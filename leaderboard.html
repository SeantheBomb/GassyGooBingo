  <style>
    .lb-page { max-width: 640px; margin: 0 auto; padding: 32px 20px 64px; }

    .lb-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }

    .lb-table th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .lb-table th.right,
    .lb-table td.right { text-align: right; }

    .lb-table td {
      padding: 11px 12px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid #141414;
    }

    .lb-table tr:first-child td { border-top: none; }

    /* Top 3 highlights */
    .lb-table tr:nth-child(1) td { color: #ffd700; }
    .lb-table tr:nth-child(2) td { color: #c0c0c0; }
    .lb-table tr:nth-child(3) td { color: #cd7f32; }

    .lb-rank {
      font-family: 'Courier New', monospace;
      color: var(--text-dim);
      font-size: 12px;
      width: 40px;
    }

    .lb-name { font-weight: 600; }

    .lb-time {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: 700;
    }

    .lb-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .lb-empty {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .lb-loading {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .lb-refresh {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 20px;
      text-align: right;
    }

    .lb-refresh button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }
    .lb-refresh button:hover { text-decoration: underline; }
  </style>
</head>
